name: balanced-8-pr
description: A/B control for balanced-8 — identical 8-member roster (5R + 3P) and simple-majority rule, differing ONLY in committee visibility (prompt-and-response vs balanced-8's response-only, D24). Pulls the v3 prompt+response comparison forward to measure how much catch / false-refusal is a visibility artifact rather than ownership-reading.
voting_rule: simple_majority
visibility: prompt-and-response  # A/B vs balanced-8 (response-only). Committee sees the user prompt AND the candidate response (the v1 default).
members:
  - police_officer
  - child_safety_officer
  - counter_extremism_analyst
  - content_moderator
  - consumer_protection_investigator
  - educator
  - journalist
  - civil_liberties_lawyer
