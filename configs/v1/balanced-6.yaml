name: balanced-6
description: True 3-vs-3 control — 3 restrictive + 3 permissive personas. Compared against `balanced-7` (which is 4R+3P) to isolate the effect of the small restrictive majority in the default roster. Note that with simple-majority voting, a 3-3 tie refuses by default; the tie rate is itself a useful signal.
voting_rule: simple_majority
members:
  - police_officer
  - child_safety_officer
  - counter_extremism_analyst
  - educator
  - journalist
  - civil_liberties_lawyer
